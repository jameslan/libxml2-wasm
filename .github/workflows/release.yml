name: Release and Publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version of the release, need to be identical to the version in package.json
      title:
        description: Title of the release
      note:
        description: Release note in Markdown format
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify version
        run: test $(jq -r .version package.json) = ${{ inputs.version }}
  build:
    uses: ./.github/workflows/build.yml
    needs: check
  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read # Use personal access token to create release, default token can be read only
      id-token: write # for OIDC when publishing to npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: create release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ inputs.title }}
          body: ${{ inputs.note }}
          tag: v${{ inputs.version }}
          artifacts: ./artifact/*
          commit: ${{ github.sha }}
          token: ${{ secrets.RELEASE_TOKEN }} # Must be a PAT with contents write access, to trigger following doc workflow
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - name: Clear auth token for OIDC # see https://github.com/actions/setup-node/issues/1440
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      - run: npm publish ./artifact/libxml2-wasm-*.tgz
